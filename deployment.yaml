services:
  mysql8-container-new:
    container_name: mysql8-container-new
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: ShopApp
    ports:
      - 3310:3306
    networks:
      - tmdt-network

  phpmyadmin8-container-new:  # Đổi tên container
    container_name: phpmyadmin8-container-new
    image: phpmyadmin/phpmyadmin
    restart: always
    depends_on:
      - mysql8-container-new
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql8-container-new
      PMA_PORT: 3306
      UPLOAD_LIMIT: 500M
    networks:
      - tmdt-network

networks:
  tmdt-network:
    name: tmdt-network
    driver: bridge
